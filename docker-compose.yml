version: '3.8'

services:
  # Java Spring Boot Backend
  claim-ai-backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
    depends_on:
      - claim-ai-ai-service
    restart: unless-stopped

  # Python AI Service
  claim-ai-ai-service:
    build:
      context: ../claim-ai-ai-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    restart: unless-stopped

  # Optional: H2 Database (for local testing)
  h2-db:
    image: oscarfonts/h2
    ports:
      - "1521:1521"
      - "8081:8081"
    environment:
      - H2_OPTIONS=-ifNotExists
    volumes:
      - h2-data:/opt/h2-data

volumes:
  h2-data:
