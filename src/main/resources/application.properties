# Application Name
spring.application.name=claim-ai-backend

# Server Port
server.port=8080

# H2 Database Configuration (for development/testing)
spring.datasource.url=jdbc:h2:mem:claimaidb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# OpenAPI / Swagger UI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Logging
logging.level.com.claimai=DEBUG
logging.level.org.springframework.web=INFO

# AI Service (mock configuration)
ai.service.url=http://localhost:8080/api/claims/analyze
